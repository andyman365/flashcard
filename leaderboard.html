<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Moved</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f4f6f9;
      color: #1f2328;
    }
    .container {
      text-align: center;
      padding: 2.5rem;
      max-width: 480px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 1rem;
      color: #24292f;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #4d4d4d;
      margin-bottom: 1.5rem;
    }
    a {
      display: inline-block;
      padding: 0.65rem 1.5rem;
      background-color: #2563eb;
      color: #ffffff;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    a:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="container">
    <h1>This site has moved</h1>
    <p>The flashcards app now lives at a new location.</p>
    <a href="https://flashcards-six-ochre.vercel.app/">Visit the new site &rarr;</a>
  </div>
</body>
</html>
